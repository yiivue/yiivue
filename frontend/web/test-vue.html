<!DOCTYPE html>
<html>
<head>
    <title>Vue Test</title>
    <script type="importmap">
        {
            "imports": {
                "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
            }
        }
    </script>
</head>
<body>
    <div id="app">{{ message }}</div>
    <script type="module">
        import { createApp } from 'vue';
        createApp({
            data() {
                return { message: 'Hello from Vue!' }
            }
        }).mount('#app');
    </script>
</body>
</html>
