<VirtualHost *:80>
    ServerName localhost

    # Document root points to Yii2 frontend web directory
    DocumentRoot /var/www/html/frontend/web

    # Alias for the compiled Vue.js assets (from Vite)
    Alias /spa /var/www/html/frontend/web/spa
    <Directory "/var/www/html/frontend/web/spa">
        Options -Indexes
        Require all granted
    </Directory>

    # Alias for the backend (Yii2 admin)
    Alias /admin /var/www/html/backend/web
    <Directory "/var/www/html/backend/web">
        AllowOverride All
        Require all granted
    </Directory>

    # Main frontend directory rules
    <Directory "/var/www/html/frontend/web">
        AllowOverride All
        Require all granted
        # If you use Vue Router in history mode, uncomment the fallback rule:
        # FallbackResource /index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/frontend_error.log
    CustomLog ${APACHE_LOG_DIR}/frontend_access.log combined
</VirtualHost>
